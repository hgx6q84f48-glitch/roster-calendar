name: Update Roster ICS

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install playwright requests icalendar
          playwright install --with-deps

      - name: Run script
        env:
          CREW_USER: ${{ secrets.CREW_USER }}
          CREW_PASS: ${{ secrets.CREW_PASS }}
        run: python roster_to_ics.py

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add roster.ics
          git diff --quiet && git diff --staged --quiet || git commit -m "Update roster"
          git push
